<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚙️ Admin — Photo Booth</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --card: #222;
    --accent: #c9a96e;
    --accent-dark: #a07840;
    --text: #f0ece4;
    --muted: #888;
    --border: #2e2e2e;
    --green: #2ecc71;
    --red: #e74c3c;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .admin-badge {
    background: rgba(201,169,110,0.15);
    border: 1px solid rgba(201,169,110,0.3);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
  }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
  }
  .btn-gallery {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 16px;
    color: var(--muted);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .btn-gallery:hover { border-color: var(--accent); color: var(--accent); }

  .container { max-width: 800px; margin: 0 auto; padding: 32px 20px; }

  /* ── FORM TAMBAH EVENT ── */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 32px;
  }
  .form-card h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 20px;
    color: var(--accent);
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  input {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    transition: border-color 0.2s;
    outline: none;
    width: 100%;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: #555; }

  .form-actions { margin-top: 18px; display: flex; gap: 10px; }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 11px 24px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary:hover { opacity: 0.85; transform: scale(1.02); }

  /* ── LIST EVENT ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-header h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
  }
  .event-count {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--muted);
  }
  .event-count span { color: var(--accent); font-weight: 600; }

  #events-list { display: flex; flex-direction: column; gap: 10px; }

  .event-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
  .event-item:hover { border-color: #444; }
  .event-item.hidden-event { opacity: 0.5; }

  .event-drag { color: #444; cursor: grab; font-size: 16px; user-select: none; flex-shrink: 0; }

  .event-info { flex: 1; min-width: 0; }
  .event-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .event-meta { font-size: 12px; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .event-folder { font-size: 11px; color: #555; margin-top: 2px; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .event-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .toggle-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .toggle-btn.visible { color: var(--green); border-color: rgba(46,204,113,0.3); background: rgba(46,204,113,0.08); }
  .toggle-btn.hidden { color: var(--muted); border-color: var(--border); }
  .toggle-btn:hover { opacity: 0.75; }

  .edit-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
  }
  .edit-btn:hover { border-color: var(--accent); color: var(--accent); }

  .delete-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    cursor: pointer;
    color: #555;
    transition: all 0.2s;
  }
  .delete-btn:hover { border-color: rgba(231,76,60,0.3); color: var(--red); background: rgba(231,76,60,0.08); }

  .empty-events {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
    border: 2px dashed var(--border);
    border-radius: 16px;
  }
  .empty-events .icon { font-size: 36px; margin-bottom: 10px; }

  /* ── EDIT MODAL ── */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  #modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 480px;
    animation: zoomIn 0.2s ease;
  }
  @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal h3 { font-family: 'Cormorant Garamond', serif; font-size: 20px; margin-bottom: 20px; color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-cancel {
    background: none;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 10px 20px;
    color: var(--muted);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: #555; color: var(--text); }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 10px 20px;
    font-size: 14px;
    color: var(--text);
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 500px) {
    .form-grid { grid-template-columns: 1fr; }
    .event-item { flex-wrap: wrap; }
    .event-actions { width: 100%; justify-content: flex-end; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="admin-badge">⚙️ Admin</div>
    <h1>Photo Booth Manager</h1>
  </div>
  <a class="btn-gallery" href="index.html" target="_blank">👁 Lihat Galeri →</a>
</header>

<div class="container">

  <!-- Form Tambah Event -->
  <div class="form-card">
    <h2>➕ Tambah Event Baru</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Nama Event *</label>
        <input type="text" id="inp-name" placeholder="cth: Wedding Budi & Sari">
      </div>
      <div class="form-group">
        <label>Tanggal Event</label>
        <input type="text" id="inp-date" placeholder="cth: Sabtu, 15 Agustus 2024">
      </div>
      <div class="form-group full">
        <label>Google Drive Folder ID *</label>
        <input type="text" id="inp-folder" placeholder="cth: 1aBcDeFgHiJkLmNoPqRsTuVwXyZ">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" onclick="addEvent()">➕ Tambah Event</button>
    </div>
  </div>

  <!-- Daftar Event -->
  <div class="section-header">
    <h2>Daftar Event</h2>
    <div class="event-count"><span id="total-count">0</span> event</div>
  </div>

  <div id="events-list"></div>

</div>

<!-- Edit Modal -->
<div id="modal-overlay">
  <div class="modal">
    <h3>✏️ Edit Event</h3>
    <input type="hidden" id="edit-id">
    <div class="form-grid" style="margin-bottom:0">
      <div class="form-group">
        <label>Nama Event *</label>
        <input type="text" id="edit-name" placeholder="Nama event">
      </div>
      <div class="form-group">
        <label>Tanggal Event</label>
        <input type="text" id="edit-date" placeholder="Tanggal">
      </div>
      <div class="form-group full">
        <label>Google Drive Folder ID *</label>
        <input type="text" id="edit-folder" placeholder="Folder ID">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="saveEdit()">💾 Simpan</button>
      <button class="btn-cancel" onclick="closeModal()">Batal</button>
    </div>
  </div>
</div>

<div id="toast">✅ Tersimpan!</div>

<script>
const STORAGE_KEY = "photobooth_events";

function getEvents() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { return []; }
}
function saveEvents(events) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

function renderEvents() {
  const events = getEvents();
  const list = document.getElementById("events-list");
  document.getElementById("total-count").textContent = events.length;

  if (events.length === 0) {
    list.innerHTML = `<div class="empty-events"><div class="icon">🗂️</div><p>Belum ada event.<br>Tambahkan event pertama di atas!</p></div>`;
    return;
  }

  list.innerHTML = "";
  events.forEach((ev, idx) => {
    const item = document.createElement("div");
    item.className = "event-item" + (ev.visible ? "" : " hidden-event");
    item.innerHTML = `
      <div class="event-drag">⠿</div>
      <div class="event-info">
        <div class="event-name">${escHtml(ev.name)}</div>
        <div class="event-meta">${ev.date ? '📅 ' + escHtml(ev.date) : '<span style="color:#444">Tanggal tidak diisi</span>'}</div>
        <div class="event-folder">📁 ${escHtml(ev.folderId)}</div>
      </div>
      <div class="event-actions">
        <button class="toggle-btn ${ev.visible ? 'visible' : 'hidden'}" onclick="toggleVisible(${idx})">
          ${ev.visible ? '👁 Tampil' : '🙈 Disembunyikan'}
        </button>
        <button class="edit-btn" onclick="openEdit(${idx})">✏️</button>
        <button class="delete-btn" onclick="deleteEvent(${idx})">🗑</button>
      </div>`;
    list.appendChild(item);
  });
}

function addEvent() {
  const name = document.getElementById("inp-name").value.trim();
  const date = document.getElementById("inp-date").value.trim();
  const folderId = document.getElementById("inp-folder").value.trim();

  if (!name) { alert("Nama event harus diisi!"); return; }
  if (!folderId) { alert("Folder ID harus diisi!"); return; }

  const events = getEvents();
  events.push({
    id: Date.now().toString(),
    name,
    date,
    folderId,
    visible: true,
    createdAt: new Date().toISOString()
  });
  saveEvents(events);

  document.getElementById("inp-name").value = "";
  document.getElementById("inp-date").value = "";
  document.getElementById("inp-folder").value = "";

  renderEvents();
  showToast("✅ Event berhasil ditambahkan!");
}

function toggleVisible(idx) {
  const events = getEvents();
  events[idx].visible = !events[idx].visible;
  saveEvents(events);
  renderEvents();
  showToast(events[idx].visible ? "👁 Event ditampilkan" : "🙈 Event disembunyikan");
}

function deleteEvent(idx) {
  const events = getEvents();
  if (!confirm(`Hapus event "${events[idx].name}"?`)) return;
  events.splice(idx, 1);
  saveEvents(events);
  renderEvents();
  showToast("🗑 Event dihapus");
}

function openEdit(idx) {
  const events = getEvents();
  const ev = events[idx];
  document.getElementById("edit-id").value = idx;
  document.getElementById("edit-name").value = ev.name;
  document.getElementById("edit-date").value = ev.date || "";
  document.getElementById("edit-folder").value = ev.folderId;
  document.getElementById("modal-overlay").classList.add("open");
}

function saveEdit() {
  const idx = parseInt(document.getElementById("edit-id").value);
  const name = document.getElementById("edit-name").value.trim();
  const date = document.getElementById("edit-date").value.trim();
  const folderId = document.getElementById("edit-folder").value.trim();

  if (!name) { alert("Nama event harus diisi!"); return; }
  if (!folderId) { alert("Folder ID harus diisi!"); return; }

  const events = getEvents();
  events[idx] = { ...events[idx], name, date, folderId };
  saveEvents(events);
  closeModal();
  renderEvents();
  showToast("✅ Event berhasil diupdate!");
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
}

document.getElementById("modal-overlay").addEventListener("click", e => {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
});

function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Enter key di form
document.getElementById("inp-folder").addEventListener("keydown", e => {
  if (e.key === "Enter") addEvent();
});

renderEvents();
</script>
</body>
</html>
