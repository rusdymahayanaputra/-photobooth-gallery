<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚙️ Admin — Photo Booth</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f0f0f;--surface:#1a1a1a;--card:#222;--accent:#c9a96e;--text:#f0ece4;--muted:#888;--border:#2e2e2e;--green:#2ecc71;--red:#e74c3c;--radius:12px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
  .hl{display:flex;align-items:center;gap:12px}
  .abadge{background:rgba(201,169,110,.15);border:1px solid rgba(201,169,110,.3);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--accent)}
  header h1{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700}
  .btn-gl{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 16px;color:var(--muted);font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
  .btn-gl:hover{border-color:var(--accent);color:var(--accent)}
  .wrap{max-width:800px;margin:0 auto;padding:32px 20px}
  .fc{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:32px}
  .fc h2{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;margin-bottom:20px;color:var(--accent)}
  .fg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .fgp{display:flex;flex-direction:column;gap:6px}
  .fgp.full{grid-column:1/-1}
  label{font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  input{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;transition:border-color .2s;outline:none;width:100%}
  input:focus{border-color:var(--accent)}
  input::placeholder{color:#555}
  .fa{margin-top:18px;display:flex;gap:10px}
  .bp{background:var(--accent);color:#fff;border:none;border-radius:999px;padding:11px 24px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .2s;display:inline-flex;align-items:center;gap:6px}
  .bp:hover{opacity:.85;transform:scale(1.02)}
  .bp:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .sh h2{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600}
  .ec{background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:4px 12px;font-size:12px;color:var(--muted)}
  .ec span{color:var(--accent);font-weight:600}
  #el{display:flex;flex-direction:column;gap:10px}
  .ei{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;display:flex;align-items:center;gap:14px;transition:border-color .2s;animation:si .3s ease}
  @keyframes si{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
  .ei:hover{border-color:#444}
  .ei.hid{opacity:.5}
  .einfo{flex:1;min-width:0}
  .ename{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .emeta{font-size:12px;color:var(--muted);margin-top:3px}
  .efold{font-size:11px;color:#555;margin-top:2px;font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .eact{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .tb{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;white-space:nowrap}
  .tb.vis{color:var(--green);border-color:rgba(46,204,113,.3);background:rgba(46,204,113,.08)}
  .tb.hid2{color:var(--muted);border-color:var(--border)}
  .tb:hover{opacity:.75}
  .tb:disabled{opacity:.4;cursor:not-allowed}
  .eb{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer;color:var(--muted);transition:all .2s}
  .eb:hover{border-color:var(--accent);color:var(--accent)}
  .eb:disabled{opacity:.4;cursor:not-allowed}
  .db{background:none;border:1px solid transparent;border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer;color:#555;transition:all .2s}
  .db:hover{border-color:rgba(231,76,60,.3);color:var(--red);background:rgba(231,76,60,.08)}
  .db:disabled{opacity:.4;cursor:not-allowed}
  .emp{text-align:center;padding:48px 24px;color:var(--muted);border:2px dashed var(--border);border-radius:16px}
  .emp .ic{font-size:36px;margin-bottom:10px}
  #mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
  #mo.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:480px;animation:zi .2s ease}
  @keyframes zi{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
  .modal h3{font-family:'Cormorant Garamond',serif;font-size:20px;margin-bottom:20px;color:var(--accent)}
  .ma{display:flex;gap:10px;margin-top:20px}
  .bc{background:none;border:1px solid var(--border);border-radius:999px;padding:10px 20px;color:var(--muted);font-family:'Outfit',sans-serif;font-size:14px;cursor:pointer;transition:all .2s}
  .bc:hover{border-color:#555;color:var(--text)}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);border-radius:999px;padding:10px 20px;font-size:14px;color:var(--text);z-index:999;transition:transform .3s;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.4)}
  #toast.show{transform:translateX(-50%) translateY(0)}
  @media(max-width:500px){.fg{grid-template-columns:1fr}.ei{flex-wrap:wrap}.eact{width:100%;justify-content:flex-end}}
</style>
</head>
<body>
<header>
  <div class="hl">
    <div class="abadge">⚙️ Admin</div>
    <h1>Photo Booth Manager</h1>
  </div>
  <a class="btn-gl" href="index.html" target="_blank">👁 Lihat Galeri →</a>
</header>

<div class="wrap">
  <div class="fc">
    <h2>➕ Tambah Event Baru</h2>
    <div class="fg">
      <div class="fgp"><label>Nama Event *</label><input type="text" id="iname" placeholder="cth: Wedding Budi & Sari"></div>
      <div class="fgp"><label>Tanggal Event</label><input type="text" id="idate" placeholder="cth: Sabtu, 15 Agustus 2024"></div>
      <div class="fgp full"><label>Google Drive Folder ID *</label><input type="text" id="ifolder" placeholder="cth: 1aBcDeFgHiJkLmNoPqRsTuVwXyZ"></div>
    </div>
    <div class="fa"><button class="bp" id="addbtn" onclick="addEvent()">➕ Tambah Event</button></div>
  </div>

  <div class="sh">
    <h2>Daftar Event</h2>
    <div class="ec"><span id="tc">0</span> event</div>
  </div>
  <div id="el"></div>
</div>

<div id="mo">
  <div class="modal">
    <h3>✏️ Edit Event</h3>
    <input type="hidden" id="eid">
    <div class="fg">
      <div class="fgp"><label>Nama Event *</label><input type="text" id="ename" placeholder="Nama event"></div>
      <div class="fgp"><label>Tanggal Event</label><input type="text" id="edate" placeholder="Tanggal"></div>
      <div class="fgp full"><label>Google Drive Folder ID *</label><input type="text" id="efolder" placeholder="Folder ID"></div>
    </div>
    <div class="ma">
      <button class="bp" id="savebtn" onclick="saveEdit()">💾 Simpan</button>
      <button class="bc" onclick="closeModal()">Batal</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
// ══════════════════════════════════
// KONFIGURASI — isi 1 baris ini
// ══════════════════════════════════
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby1u_AtcGLCfaZMAwyLDmb_G76xxGLENxUQEqkZu4wHhf_KhcCS4NZtuNR-kaWpdAe_pA/exec";
// ══════════════════════════════════

function toast(msg) {
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

function setLoading(id, on) {
  const el=document.getElementById(id);
  if(el){el.disabled=on; if(on)el.textContent="⏳ Menyimpan...";}
}

async function api(body) {
  const res = await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(body)
  });
  return res.json();
}

async function loadEvents() {
  document.getElementById("el").innerHTML = `<div style="text-align:center;padding:32px;color:var(--muted)">⏳ Memuat event...</div>`;
  try {
    const data = await (await fetch(`${SCRIPT_URL}?action=getEvents`)).json();
    renderEvents(data.events || []);
  } catch(e) {
    document.getElementById("el").innerHTML = `<div style="color:#e74c3c;padding:20px">⚠️ Gagal memuat: ${e.message}</div>`;
  }
}

function renderEvents(events) {
  document.getElementById("tc").textContent = events.length;
  const list = document.getElementById("el");
  if (!events.length) {
    list.innerHTML = `<div class="emp"><div class="ic">🗂️</div><p>Belum ada event.<br>Tambahkan event pertama di atas!</p></div>`;
    return;
  }
  list.innerHTML = "";
  events.forEach(ev => {
    const d = document.createElement("div");
    d.className = "ei" + (ev.visible ? "" : " hid");
    d.id = "ev-" + ev.id;
    d.innerHTML = `
      <div class="einfo">
        <div class="ename">${esc(ev.name)}</div>
        <div class="emeta">${ev.date ? '📅 '+esc(ev.date) : '<span style="color:#444">Tanggal tidak diisi</span>'}</div>
        <div class="efold">📁 ${esc(ev.folderId)}</div>
      </div>
      <div class="eact">
        <button class="tb ${ev.visible?'vis':'hid2'}" onclick="toggleVis('${ev.id}',this)">
          ${ev.visible ? '👁 Tampil' : '🙈 Tersembunyi'}
        </button>
        <button class="eb" onclick="openEdit('${ev.id}','${esc(ev.name)}','${esc(ev.date||'')}','${esc(ev.folderId)}')">✏️</button>
        <button class="db" onclick="deleteEv('${ev.id}','${esc(ev.name)}',this)">🗑</button>
      </div>`;
    list.appendChild(d);
  });
}

async function addEvent() {
  const name=document.getElementById("iname").value.trim();
  const date=document.getElementById("idate").value.trim();
  const folderId=document.getElementById("ifolder").value.trim();
  if(!name){alert("Nama event harus diisi!");return;}
  if(!folderId){alert("Folder ID harus diisi!");return;}
  const btn=document.getElementById("addbtn");
  btn.disabled=true; btn.textContent="⏳ Menyimpan...";
  try {
    await api({action:"addEvent",name,date,folderId});
    document.getElementById("iname").value="";
    document.getElementById("idate").value="";
    document.getElementById("ifolder").value="";
    toast("✅ Event berhasil ditambahkan!");
    loadEvents();
  } catch(e) { toast("❌ Gagal: "+e.message); }
  finally { btn.disabled=false; btn.textContent="➕ Tambah Event"; }
}

async function toggleVis(id, btn) {
  btn.disabled=true;
  try {
    const res = await api({action:"toggleVisible",id});
    toast(res.visible ? "👁 Event ditampilkan" : "🙈 Event disembunyikan");
    loadEvents();
  } catch(e) { toast("❌ Gagal: "+e.message); btn.disabled=false; }
}

async function deleteEv(id, name, btn) {
  if(!confirm(`Hapus event "${name}"?`)) return;
  btn.disabled=true;
  try {
    await api({action:"deleteEvent",id});
    toast("🗑 Event dihapus");
    loadEvents();
  } catch(e) { toast("❌ Gagal: "+e.message); btn.disabled=false; }
}

function openEdit(id, name, date, folderId) {
  document.getElementById("eid").value=id;
  document.getElementById("ename").value=name;
  document.getElementById("edate").value=date;
  document.getElementById("efolder").value=folderId;
  document.getElementById("mo").classList.add("open");
}

async function saveEdit() {
  const id=document.getElementById("eid").value;
  const name=document.getElementById("ename").value.trim();
  const date=document.getElementById("edate").value.trim();
  const folderId=document.getElementById("efolder").value.trim();
  if(!name){alert("Nama event harus diisi!");return;}
  if(!folderId){alert("Folder ID harus diisi!");return;}
  const btn=document.getElementById("savebtn");
  btn.disabled=true; btn.textContent="⏳ Menyimpan...";
  try {
    await api({action:"updateEvent",id,name,date,folderId});
    closeModal();
    toast("✅ Event berhasil diupdate!");
    loadEvents();
  } catch(e) { toast("❌ Gagal: "+e.message); }
  finally { btn.disabled=false; btn.textContent="💾 Simpan"; }
}

function closeModal() { document.getElementById("mo").classList.remove("open"); }
document.getElementById("mo").addEventListener("click",e=>{if(e.target===document.getElementById("mo"))closeModal()});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal()});
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}

loadEvents();
</script>
</body>
</html>
