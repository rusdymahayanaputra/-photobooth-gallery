<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📸 Galeri Foto — Photo Booth</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --card: #222222;
    --accent: #f5c842;
    --accent2: #ff6b6b;
    --text: #f0ece4;
    --muted: #888;
    --border: #2e2e2e;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NOISE TEXTURE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 1;
    padding: 48px 24px 32px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  .event-badge {
    display: inline-block;
    background: var(--accent);
    color: #000;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 999px;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #f0ece4 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
  }

  #photo-count {
    display: inline-block;
    margin-top: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 5px 16px;
    font-size: 13px;
    color: var(--muted);
  }
  #photo-count span { color: var(--accent); font-weight: 600; }

  /* ── LOADING ── */
  #loading {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 80px 24px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── GRID ── */
  #gallery {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    padding: 32px 20px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .photo-card {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    cursor: pointer;
    transform: translateY(20px);
    opacity: 0;
    animation: fadeUp 0.5s ease forwards;
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    position: relative;
  }
  .photo-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    border-color: var(--accent);
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .photo-card img {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    display: block;
    background: var(--surface);
    transition: transform 0.4s ease;
  }
  .photo-card:hover img { transform: scale(1.03); }

  .photo-card .new-badge {
    position: absolute;
    top: 10px; left: 10px;
    background: var(--accent);
    color: #000;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 999px;
  }

  .card-footer {
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .card-time {
    font-size: 12px;
    color: var(--muted);
  }

  .card-actions {
    display: flex;
    gap: 6px;
  }

  .btn-icon {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 14px;
    cursor: pointer;
    color: var(--text);
    text-decoration: none;
    transition: background 0.2s, border-color 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
  }
  .btn-icon:hover { background: var(--accent); border-color: var(--accent); color: #000; }
  .btn-wa:hover { background: #25d366; border-color: #25d366; color: #fff; }

  /* ── LIGHTBOX ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(8px);
  }
  #lightbox.open { display: flex; }

  #lightbox img {
    max-width: 90vw;
    max-height: 85vh;
    object-fit: contain;
    border-radius: 12px;
    box-shadow: 0 40px 100px rgba(0,0,0,0.8);
    animation: zoomIn 0.25s ease;
  }
  @keyframes zoomIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  #lightbox-close {
    position: absolute;
    top: 20px; right: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 40px; height: 40px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  #lightbox-close:hover { background: var(--accent2); border-color: var(--accent2); }

  #lightbox-actions {
    position: absolute;
    bottom: 24px;
    display: flex;
    gap: 10px;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 999px;
    padding: 10px 22px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: opacity 0.2s, transform 0.2s;
  }
  .btn-primary:hover { opacity: 0.85; transform: scale(1.03); }

  .btn-secondary {
    background: #25d366;
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 10px 22px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: opacity 0.2s, transform 0.2s;
  }
  .btn-secondary:hover { opacity: 0.85; transform: scale(1.03); }

  /* ── EMPTY STATE ── */
  #empty {
    display: none;
    text-align: center;
    padding: 80px 24px;
    position: relative;
    z-index: 1;
  }
  #empty .emoji { font-size: 48px; margin-bottom: 16px; }
  #empty p { color: var(--muted); }

  /* ── FOOTER ── */
  footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 32px 24px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 13px;
  }

  /* ── MOBILE ── */
  @media (max-width: 480px) {
    #gallery { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 16px 12px; }
    .card-footer { flex-direction: column; align-items: flex-start; gap: 6px; }
  }
</style>
</head>
<body>

<header>
  <div class="event-badge">📸 Photo Booth</div>
  <h1 id="event-title">NAMA EVENT</h1>
  <p class="subtitle" id="event-date">Tanggal Event</p>
  <div id="photo-count">Memuat... <span id="count-num">0</span> foto</div>
</header>

<div id="loading">
  <div class="spinner"></div>
  <p style="color: var(--muted); font-size: 14px;">Memuat foto...</p>
</div>

<div id="empty">
  <div class="emoji">📷</div>
  <p>Belum ada foto tersedia.<br>Silakan cek kembali sebentar lagi!</p>
</div>

<div id="gallery"></div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="Foto">
  <div id="lightbox-actions">
    <a id="lightbox-download" class="btn-primary" href="#" download>⬇ Download</a>
    <a id="lightbox-wa" class="btn-secondary" href="#" target="_blank">🟢 Share WA</a>
  </div>
</div>

<footer>
  Foto terbaru selalu tampil paling atas &nbsp;·&nbsp; Refresh halaman untuk update terbaru
</footer>

<script>
// ══════════════════════════════════════════════
// ▶ KONFIGURASI — Edit bagian ini setiap event
// ══════════════════════════════════════════════
const CONFIG = {
  // Nama event (tampil di header)
  eventName: "Wedding Budi & Sari",

  // Tanggal event
  eventDate: "Sabtu, 15 Agustus 2024",

  // ID folder Google Drive yang berisi semua foto event
  // Ambil dari URL folder: drive.google.com/drive/folders/INI_ID_NYA
  driveFolderId: "1XDgZSwbAoH7Jdyc_eS0p2Sh7XiqyXnsj",

  // API Key Google Drive (buat di Google Cloud Console)
  apiKey: "AIzaSyCTa5Vjz8IvcoMmyl4I-PZOlo-DiVSPygk",
};
// ══════════════════════════════════════════════

// Set header info
document.getElementById("event-title").textContent = CONFIG.eventName;
document.getElementById("event-date").textContent = CONFIG.eventDate;
document.title = `📸 ${CONFIG.eventName}`;

let currentImageUrl = "";

async function loadPhotos() {
  try {
    const url = `https://www.googleapis.com/drive/v3/files`
      + `?q='${CONFIG.driveFolderId}'+in+parents+and+mimeType+contains+'image/'`
      + `&orderBy=createdTime+desc`
      + `&fields=files(id,name,createdTime,thumbnailLink,webContentLink,webViewLink)`
      + `&pageSize=200`
      + `&key=${CONFIG.apiKey}`;

    const res = await fetch(url);
    if (!res.ok) throw new Error(`API Error: ${res.status}`);
    const data = await res.json();

    document.getElementById("loading").style.display = "none";

    if (!data.files || data.files.length === 0) {
      document.getElementById("empty").style.display = "block";
      return;
    }

    renderPhotos(data.files);
    document.getElementById("count-num").textContent = data.files.length;
    document.getElementById("photo-count").innerHTML =
      `Total <span id="count-num">${data.files.length}</span> foto`;

  } catch (err) {
    document.getElementById("loading").innerHTML = `
      <p style="color:#ff6b6b; font-size:14px;">
        ⚠️ Gagal memuat foto.<br>
        <small style="color:var(--muted)">Pastikan Folder ID dan API Key sudah benar.<br>${err.message}</small>
      </p>`;
    console.error(err);
  }
}

function renderPhotos(files) {
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  const now = Date.now();

  files.forEach((file, index) => {
    const createdTime = new Date(file.createdTime);
    const isNew = (now - createdTime.getTime()) < 30 * 60 * 1000; // < 30 menit = NEW

    const timeStr = createdTime.toLocaleTimeString("id-ID", {
      hour: "2-digit", minute: "2-digit"
    });
    const dateStr = createdTime.toLocaleDateString("id-ID", {
      day: "numeric", month: "short"
    });

    // Thumbnail dari Drive
    const thumbUrl = file.thumbnailLink
      ? file.thumbnailLink.replace("=s220", "=s600")
      : `https://drive.google.com/thumbnail?id=${file.id}&sz=w600`;

    // Direct download link
    const downloadUrl = `https://drive.google.com/uc?export=download&id=${file.id}`;
    const viewUrl = `https://drive.google.com/file/d/${file.id}/view`;

    // Share WA
    const waText = encodeURIComponent(`Lihat foto saya dari ${CONFIG.eventName}! 📸\n${viewUrl}`);
    const waUrl = `https://wa.me/?text=${waText}`;

    const card = document.createElement("div");
    card.className = "photo-card";
    card.style.animationDelay = `${index * 0.05}s`;
    card.innerHTML = `
      ${isNew ? '<div class="new-badge">✨ Baru</div>' : ''}
      <img src="${thumbUrl}" alt="${file.name}" loading="lazy"
           onclick="openLightbox('${thumbUrl}', '${downloadUrl}', '${waUrl}')">
      <div class="card-footer">
        <span class="card-time">🕐 ${timeStr} · ${dateStr}</span>
        <div class="card-actions">
          <a class="btn-icon" href="${downloadUrl}" download title="Download">⬇</a>
          <a class="btn-icon btn-wa" href="${waUrl}" target="_blank" title="Share WhatsApp">🟢</a>
        </div>
      </div>
    `;

    gallery.appendChild(card);
  });
}

function openLightbox(imgUrl, downloadUrl, waUrl) {
  document.getElementById("lightbox-img").src = imgUrl;
  document.getElementById("lightbox-download").href = downloadUrl;
  document.getElementById("lightbox-wa").href = waUrl;
  document.getElementById("lightbox").classList.add("open");
  currentImageUrl = imgUrl;
}

function closeLightbox() {
  document.getElementById("lightbox").classList.remove("open");
}

// Tutup lightbox klik di luar gambar
document.getElementById("lightbox").addEventListener("click", function(e) {
  if (e.target === this) closeLightbox();
});

// Keyboard ESC
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeLightbox();
});

// Load foto saat halaman dibuka
loadPhotos();

// Auto-refresh setiap 60 detik
setInterval(loadPhotos, 60000);
</script>
</body>
</html>
